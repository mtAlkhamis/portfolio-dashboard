<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Alkhamis Family Portfolio — Performance Report</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="icon" type="image/png" href="favicon.png" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FAF6EC;
    --paper: #FFFDF7;
    --ink: #1F3A2E;
    --ink-soft: #4B5C53;
    --muted: #8A8676;
    --line: #E8DFC8;
    --line-soft: #F1EAD3;
    --accent: #2D6A4F;
    --accent-soft: #DDE9D4;
    --gold: #B8924E;
    --positive: #2D6A4F;
    --negative: #B0413E;
    --pos-bar-start: #4A8268;
    --pos-bar-end:   #1F4F38;
    --neg-bar-start: #C56462;
    --neg-bar-end:   #8B2D29;
    --cash-bar-start: #D4A964;
    --cash-bar-end:   #9B7235;
    --pill-buy-bg: #E0F0E0;       --pill-buy-fg: #1F5C3E;
    --pill-sell-bg: #FFE8DA;      --pill-sell-fg: #9B4216;
    --pill-div-bg:  #FFF3C4;      --pill-div-fg:  #8C6606;
    --pill-dep-bg:  #D8E8F5;      --pill-dep-fg:  #235480;
    --shadow-card: 0 1px 2px rgba(31, 58, 46, 0.04), 0 4px 16px rgba(31, 58, 46, 0.05);
    --shadow-card-hover: 0 4px 8px rgba(31, 58, 46, 0.06), 0 12px 28px rgba(31, 58, 46, 0.10);
    --font-display: 'Playfair Display', 'Georgia', 'Times New Roman', serif;
  }
  /* Dark mode palette — applied when the device prefers dark OR the user has
     explicitly picked Dark via the theme toggle. The :not([data-theme="light"])
     guard lets the Light override win even when the OS is dark. */
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --bg: #121A16;
      --paper: #1B2A22;
      --ink: #E8E2D0;
      --ink-soft: #B8B5A8;
      --muted: #8A8676;
      --line: #2C3D34;
      --line-soft: #243029;
      --accent: #5BAE85;
      --accent-soft: #243B30;
      --gold: #D4AC65;
      --positive: #6FBE92;
      --negative: #E07770;
      --pos-bar-start: #4A8268;
      --pos-bar-end:   #1F4F38;
      --neg-bar-start: #E07770;
      --neg-bar-end:   #9B3A36;
      --cash-bar-start: #D4A964;
      --cash-bar-end:   #9B7235;
      --pill-buy-bg: #1F3D2B;     --pill-buy-fg: #9CD4B0;
      --pill-sell-bg: #3D2417;    --pill-sell-fg: #E8A878;
      --pill-div-bg:  #3D3414;    --pill-div-fg:  #E8C870;
      --pill-dep-bg:  #1F324A;    --pill-dep-fg:  #9CC0E0;
      --shadow-card: 0 1px 2px rgba(0, 0, 0, 0.25), 0 4px 16px rgba(0, 0, 0, 0.35);
      --shadow-card-hover: 0 4px 8px rgba(0, 0, 0, 0.35), 0 12px 28px rgba(0, 0, 0, 0.50);
    }
  }
  :root[data-theme="dark"] {
    --bg: #121A16;
    --paper: #1B2A22;
    --ink: #E8E2D0;
    --ink-soft: #B8B5A8;
    --muted: #8A8676;
    --line: #2C3D34;
    --line-soft: #243029;
    --accent: #5BAE85;
    --accent-soft: #243B30;
    --gold: #D4AC65;
    --positive: #6FBE92;
    --negative: #E07770;
    --pos-bar-start: #4A8268;
    --pos-bar-end:   #1F4F38;
    --neg-bar-start: #E07770;
    --neg-bar-end:   #9B3A36;
    --cash-bar-start: #D4A964;
    --cash-bar-end:   #9B7235;
    --pill-buy-bg: #1F3D2B;     --pill-buy-fg: #9CD4B0;
    --pill-sell-bg: #3D2417;    --pill-sell-fg: #E8A878;
    --pill-div-bg:  #3D3414;    --pill-div-fg:  #E8C870;
    --pill-dep-bg:  #1F324A;    --pill-dep-fg:  #9CC0E0;
    --shadow-card: 0 1px 2px rgba(0, 0, 0, 0.25), 0 4px 16px rgba(0, 0, 0, 0.35);
    --shadow-card-hover: 0 4px 8px rgba(0, 0, 0, 0.35), 0 12px 28px rgba(0, 0, 0, 0.50);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: "Helvetica Neue", -apple-system, BlinkMacSystemFont, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    line-height: 1.5;
    transition: background-color 0.25s ease, color 0.25s ease;
  }
  .report {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 36px 60px;
  }

  /* Upload bar (utility, small, hidden in print) */
  .upload-bar {
    margin-top: 20px;
    padding: 10px 14px;
    background: color-mix(in srgb, var(--paper) 60%, transparent);
    border: 1px dashed var(--line);
    border-radius: 8px;
    display: flex; align-items: center; flex-wrap: wrap;
    justify-content: space-between; gap: 8px 14px;
    font-size: 13px; color: var(--muted);
  }
  .upload-bar button.load-btn {
    background: var(--accent); color: white; border: none;
    padding: 6px 14px; border-radius: 5px; font-weight: 600;
    cursor: pointer; font-size: 12px;
    transition: background 0.15s;
    flex-shrink: 0;
  }
  .upload-bar button.load-btn:hover { background: var(--ink); }
  .upload-bar input[type=file] { display: none; }

  /* Theme toggle — segmented control: Auto / Light / Dark */
  .theme-toggle {
    display: inline-flex;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 2px;
    gap: 2px;
    flex-shrink: 0;
  }
  .theme-toggle button {
    background: transparent;
    border: none;
    padding: 4px 9px;
    border-radius: 4px;
    cursor: pointer;
    color: var(--muted);
    font-size: 11px;
    font-weight: 600;
    line-height: 1;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    transition: background 0.15s, color 0.15s;
  }
  .theme-toggle button:hover { color: var(--ink); }
  .theme-toggle button.active {
    background: var(--paper);
    color: var(--ink);
    box-shadow: 0 1px 2px rgba(0,0,0,0.08);
  }
  .theme-toggle button svg {
    width: 12px; height: 12px;
    stroke: currentColor; fill: none;
    stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
  }
  @media print {
    .upload-bar { display: none; }
    body { background: white; }
    .report { padding-top: 20px; }
  }

  /* Masthead */
  .masthead {
    padding: 56px 0 36px;
    border-bottom: 1px solid var(--line);
    margin-bottom: 40px;
  }
  .eyebrow {
    text-transform: uppercase; letter-spacing: 3px;
    font-size: 11px; color: var(--gold);
    font-weight: 600;
    margin-bottom: 14px;
  }
  .masthead h1 {
    margin: 0;
    font-family: var(--font-display);
    font-size: 52px; font-weight: 700;
    letter-spacing: -1.2px; color: var(--ink);
    line-height: 1.05;
  }
  .masthead .subtitle {
    margin-top: 12px;
    font-family: var(--font-display);
    color: var(--ink-soft); font-size: 17px;
    font-style: italic; font-weight: 600;
  }
  .masthead .meta {
    margin-top: 22px;
    display: flex; gap: 28px;
    font-size: 13px; color: var(--muted);
  }
  .masthead .meta .label { font-weight: 600; color: var(--ink); margin-right: 5px; }

  /* Headline KPIs */
  .headline {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 40px 36px;
    margin-bottom: 40px;
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 20px;
    box-shadow: var(--shadow-card);
  }
  /* Each KPI is a flex column — label pins to bottom, value stays on the
     same row across all cards regardless of label/subtitle line count */
  .headline .kpi {
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .headline .kpi-label {
    text-transform: uppercase; letter-spacing: 1.4px;
    font-size: 10px; font-weight: 700; color: var(--muted);
    /* Fixed height = space for 2 lines; label text pins to the bottom */
    min-height: 28px;
    display: flex; align-items: flex-end; justify-content: center;
    text-align: center;
    margin-bottom: 12px;
  }
  .headline .kpi-value {
    font-family: var(--font-display);
    font-size: 36px; font-weight: 700;
    color: var(--ink); letter-spacing: -0.8px;
    line-height: 1.05;
    font-variant-numeric: tabular-nums;
  }
  .headline .kpi-value.positive { color: var(--positive); }
  .headline .kpi-value.negative { color: var(--negative); }
  .headline .kpi-sub {
    margin-top: 8px;
    font-size: 11px; color: var(--muted);
    min-height: 30px; /* reserve space for 2 subtitle lines */
  }

  /* Performance banner (annualized) */
  .perf-banner {
    background: linear-gradient(135deg, var(--accent-soft) 0%, color-mix(in srgb, var(--gold) 15%, transparent) 100%);
    border-left: 4px solid var(--accent);
    border-radius: 0 10px 10px 0;
    padding: 20px 26px;
    margin-bottom: 50px;
    font-size: 16px;
    line-height: 1.6;
    color: var(--ink);
  }
  .perf-banner .perf-rate {
    font-weight: 800; color: var(--accent); font-size: 18px;
  }

  /* Section */
  .section { margin-bottom: 52px; }
  .section h2 {
    margin: 0 0 6px 0;
    font-family: var(--font-display);
    font-size: 26px; font-weight: 700;
    color: var(--ink); letter-spacing: -0.5px;
  }
  .section .section-sub {
    color: var(--muted); font-size: 13px;
    margin-bottom: 22px;
    font-style: italic;
  }

  /* Family member cards */
  .members {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 12px;
  }
  .member {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 18px 12px;
    text-align: center;
    box-shadow: var(--shadow-card);
    transition: transform 0.25s ease, box-shadow 0.25s ease;
  }
  .member:hover {
    transform: translateY(-3px);
    box-shadow: var(--shadow-card-hover);
  }
  .member .name {
    font-family: var(--font-display);
    font-size: 17px; font-weight: 700;
    color: var(--ink);
    padding-bottom: 10px;
    border-bottom: 1px solid var(--line-soft);
    margin-bottom: 12px;
    letter-spacing: -0.2px;
  }
  .member .row {
    display: flex; justify-content: space-between;
    font-size: 12px;
    padding: 3px 0;
  }
  .member .row .label { color: var(--muted); }
  .member .row .value {
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  .member .row.headline-row {
    border-top: 1px solid var(--line-soft);
    margin-top: 8px; padding-top: 10px;
  }
  .member .row.headline-row .value {
    font-size: 14px;
    color: var(--positive);
  }
  .member .row .value.negative { color: var(--negative); }

  /* Two-column chart row */
  .two-col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 50px;
  }
  .chart-card {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 22px;
    box-shadow: var(--shadow-card);
    transition: box-shadow 0.25s ease;
  }
  .chart-card:hover { box-shadow: var(--shadow-card-hover); }
  .chart-card h3 {
    margin: 0 0 16px 0;
    font-size: 13px;
    text-transform: uppercase; letter-spacing: 1.5px;
    color: var(--ink-soft); font-weight: 700;
  }
  .chart-wrap {
    position: relative; height: 240px;
  }

  /* Donut + CSS-controlled side legend (replaces Chart.js's built-in legend so
     it resizes cleanly when the browser width changes) */
  .donut-content {
    display: flex;
    align-items: center;
    gap: 14px;
    min-height: 240px;
  }
  .donut-chart-wrap {
    position: relative;
    flex: 1 1 58%;
    min-width: 0;
    height: 240px;
  }
  .donut-legend {
    flex: 1 1 42%;
    min-width: 0;
    list-style: none;
    margin: 0;
    padding: 0;
    font-size: 13px;
  }
  .donut-legend li {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 0;
    border-bottom: 1px dotted var(--line-soft);
  }
  .donut-legend li:last-child { border-bottom: none; }
  .donut-legend .swatch {
    width: 12px; height: 12px; border-radius: 3px;
    flex: 0 0 12px;
  }
  .donut-legend .legend-label {
    flex: 1; color: var(--ink); font-weight: 500;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .donut-legend .legend-pct {
    color: var(--muted); font-weight: 600;
    font-variant-numeric: tabular-nums;
    font-size: 12px;
  }

  /* Tables */
  table {
    width: 100%; border-collapse: collapse;
    font-size: 13px;
  }
  th {
    text-align: left; padding: 12px 10px;
    color: var(--muted); font-weight: 600;
    border-bottom: 2px solid var(--line);
    font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px;
  }
  td {
    padding: 12px 10px;
    border-bottom: 1px solid var(--line-soft);
    color: var(--ink);
    font-variant-numeric: tabular-nums;
  }
  th.num, td.num { text-align: right; }
  td.pos { color: var(--positive); }
  td.neg { color: var(--negative); }
  td.bold-col { font-weight: 700; font-size: 14px; }
  tr.total td {
    font-weight: 700;
    font-size: 14px;
    background: var(--accent-soft);
    border-top: 2px solid var(--accent);
  }
  /* Holdings table scrolls horizontally inside its card */
  .holdings-table-card {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  .holdings-table-card table {
    min-width: 780px;
    width: 100%;
  }
  .exch-tag {
    font-size: 10px; font-weight: 500; color: var(--muted);
    background: var(--bg); border-radius: 3px;
    padding: 1px 4px; margin-left: 4px; vertical-align: middle;
    letter-spacing: .03em;
  }
  .table-card {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 22px 26px;
    box-shadow: var(--shadow-card);
  }

  /* Activity pills */
  .pill {
    display: inline-block; padding: 2px 9px; border-radius: 12px;
    font-size: 11px; background: var(--accent-soft); color: var(--accent);
    font-weight: 600;
  }
  .pill.buy { background: var(--pill-buy-bg); color: var(--pill-buy-fg); }
  .pill.sell { background: var(--pill-sell-bg); color: var(--pill-sell-fg); }
  .pill.dividend { background: var(--pill-div-bg); color: var(--pill-div-fg); }
  .pill.deposit { background: var(--pill-dep-bg); color: var(--pill-dep-fg); }
  .pill.withdraw { background: color-mix(in srgb, var(--negative) 20%, transparent); color: var(--negative); }

  /* Footer */

  /* ── Benchmark Section ── */
  .benchmark-periods {
    display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;
  }
  .period-btn {
    padding: 6px 16px; border-radius: 20px;
    border: 1.5px solid var(--line);
    background: transparent;
    color: var(--ink-soft);
    font-size: 13px; font-weight: 500;
    cursor: pointer;
    transition: background 0.18s, color 0.18s, border-color 0.18s, box-shadow 0.18s;
    font-family: inherit;
  }
  .period-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }
  /* Active state: accent-tinted fill + accent text (always readable in both
     themes since both --accent-soft and --accent are tuned per theme) +
     a soft outer ring as the "surrounding box" the user asked for. */
  .period-btn.active {
    background: var(--accent-soft);
    border-color: var(--accent);
    color: var(--accent);
    font-weight: 700;
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 18%, transparent);
  }
  .period-btn.active:hover {
    background: var(--accent-soft);
    color: var(--accent);
  }
  .benchmark-summary {
    display: flex; gap: 24px; margin-bottom: 20px; flex-wrap: wrap;
  }
  .bm-stat {
    display: flex; flex-direction: column; gap: 2px;
  }
  .bm-stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
  .bm-stat-value { font-size: 22px; font-weight: 700; font-family: 'Playfair Display', serif; color: var(--ink); }
  .bm-stat-value.pos { color: var(--positive); }
  .bm-stat-value.neg { color: var(--negative); }
  .bm-stat-delta { font-size: 12px; color: var(--muted); }
  .bm-stat-delta.pos { color: var(--positive); }
  .bm-stat-delta.neg { color: var(--negative); }
  .benchmark-note { font-size: 11px; color: var(--muted); margin-top: 8px; font-style: italic; }

  footer {
    margin-top: 60px; padding-top: 24px;
    border-top: 1px solid var(--line);
    text-align: center;
    color: var(--muted); font-size: 12px;
  }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
  }
  .empty strong {
    display: block;
    font-size: 18px; color: var(--ink);
    margin-bottom: 8px;
  }

  @media (max-width: 900px) {
    .headline { grid-template-columns: repeat(3, 1fr); }
    .two-col { grid-template-columns: 1fr; }
    .members { grid-template-columns: repeat(2, 1fr); }
    .masthead h1 { font-size: 36px; }
    .headline .kpi-value { font-size: 28px; }
    .report { padding: 0 20px 40px; }
  }
  @media print {
    .section, .two-col { page-break-inside: avoid; }
    .members { grid-template-columns: repeat(7, 1fr); }
    .chart-card, .member, .table-card, .headline { box-shadow: none; }
  }

  /* ── Mobile (iPhone) — desktop layout is completely unaffected ── */
  @media (max-width: 480px) {
    .report { padding: 0 14px 40px; }

    /* Masthead */
    .masthead { padding: 28px 0 20px; }
    .masthead h1 { font-size: 28px; }
    .masthead .subtitle { font-size: 14px; }
    .masthead .meta { flex-direction: column; gap: 4px; font-size: 13px; }

    /* Upload bar — stack into rows */
    .upload-bar button.load-btn {
      width: 100%; padding: 13px; font-size: 15px; text-align: center;
    }
    #priceTag { margin-left: 0 !important; width: 100%; text-align: center; font-size: 13px; }

    /* Theme toggle — own centered row, equal-width buttons, easy to tap */
    .theme-toggle {
      width: 100%;
      display: flex;
      justify-content: center;
    }
    .theme-toggle button {
      flex: 1;
      padding: 10px 4px;
      font-size: 14px;
      justify-content: center;
    }
    .theme-toggle button svg { width: 14px; height: 14px; }

    /* KPI headline */
    .headline { grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 18px 14px; }
    .headline .kpi-value { font-size: 26px; }
    .headline .kpi-label { font-size: 13px; }
    .headline .kpi-sub   { font-size: 13px; }

    /* Section headers */
    .section { margin-bottom: 32px; }
    .section h2 { font-size: 20px; }
    .section .section-sub { font-size: 13px; }

    /* Member cards — 1 per row, bigger fonts */
    .members { grid-template-columns: 1fr; gap: 10px; }
    .member { font-size: 15px; padding: 12px 10px; }
    .member .name { font-size: 17px; }
    .member .row .label { font-size: 13px; }
    .member .row .value { font-size: 15px; }

    /* Two-col section spacing */
    .two-col { margin-bottom: 28px; }

    /* Charts */
    .chart-card { padding: 14px; }
    .chart-wrap { min-height: 220px; }

    /* Donut layout — stack vertically */
    .donut-content { flex-direction: column; align-items: center; }
    .donut-chart-wrap { width: 180px; height: 180px; }
    .donut-legend { width: 100%; max-width: 300px; }
    .donut-legend li { font-size: 13px; }

    /* Tables — horizontal scroll */
    .table-card { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .table-card table { min-width: 520px; font-size: 13px; }

    /* Benchmark period buttons */
    .benchmark-periods { gap: 6px; }
    .period-btn { padding: 11px 14px; font-size: 14px; }

    /* Benchmark summary stats */
    .benchmark-summary { gap: 14px; }
    .bm-stat-value { font-size: 20px; }
    .bm-stat-label { font-size: 12px; }
    .bm-stat-delta { font-size: 13px; }
  }

  /* ── ETF Look-Through ── */
  .lookthrough-controls {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 18px; flex-wrap: wrap;
  }
  .lookthrough-controls label {
    font-size: 12px; font-weight: 600; color: var(--muted);
    text-transform: uppercase; letter-spacing: 1px;
  }
  .lookthrough-controls select {

// ─── Theme management ───────────────────────────────────────────────
// Default is "auto" (follow device preference). User can override with
// Light / Dark via the segmented toggle in the upload bar. Pick is
// remembered in localStorage so it survives reloads.
const THEME_KEY = 'portfolio.theme';
function applyTheme(pref) {
  // pref ∈ {"auto","light","dark"}. "auto" means remove the override
  // and let the @media (prefers-color-scheme) CSS rule decide.
  const root = document.documentElement;
  if (pref === 'light' || pref === 'dark') root.setAttribute('data-theme', pref);
  else root.removeAttribute('data-theme');
  // Reflect active state in the segmented control.
  document.querySelectorAll('.theme-toggle button[data-theme-set]').forEach(b => {
    b.classList.toggle('active', b.getAttribute('data-theme-set') === pref);
  });
}
function currentThemePref() {
  return localStorage.getItem(THEME_KEY) || 'auto';
}
function setThemePref(pref) {
  if (pref === 'auto') localStorage.removeItem(THEME_KEY);
  else localStorage.setItem(THEME_KEY, pref);
  applyTheme(pref);
  // Charts cache colors at construction time, so they need a redraw.
  if (typeof state !== 'undefined' && state.wb) rerenderChartsOnly();
}
// Apply theme as early as possible to avoid a light → dark flash.
applyTheme(currentThemePref());

// React to OS theme changes when the user is on Auto.
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
  if (currentThemePref() === 'auto' && typeof state !== 'undefined' && state.wb) rerenderChartsOnly();
});
// Wire up toggle buttons once the DOM is parsed.
document.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('.theme-toggle button[data-theme-set]').forEach(b => {
    b.addEventListener('click', () => setThemePref(b.getAttribute('data-theme-set')));
  });
});

// Read current theme colors from CSS variables. Charts call this at
// construction so they pick up whichever palette is active right now.
function themeColors() {
  const cs = getComputedStyle(document.documentElement);
  const v = name => cs.getPropertyValue(name).trim();
  return {
    bg:        v('--bg'),
    paper:     v('--paper'),
    ink:       v('--ink'),
    inkSoft:   v('--ink-soft'),
    muted:     v('--muted'),
    line:      v('--line'),
    lineSoft:  v('--line-soft'),
    accent:    v('--accent'),
    gold:      v('--gold'),
    positive:  v('--positive'),
    negative:  v('--negative'),
    posBarStart: v('--pos-bar-start'),
    posBarEnd:   v('--pos-bar-end'),
    negBarStart: v('--neg-bar-start'),
    negBarEnd:   v('--neg-bar-end'),
    cashBarStart: v('--cash-bar-start'),
    cashBarEnd:   v('--cash-bar-end'),
  };
}

// Track live Chart.js instances so we can destroy and rebuild them
// when the theme switches (otherwise old colors stay baked into the canvas).
const chartInstances = [];
function rerenderChartsOnly() {
  if (!state.wb) return;
  while (chartInstances.length) {
    try { chartInstances.pop().destroy(); } catch (e) {}
  }
  const holdings = parseHoldings();
  const txs = parseTransactions();
  const perf = computePerformance(txs, holdings);
  renderCharts(perf, holdings, txs);
  setTimeout(() => { renderBenchmarkChart(); }, 10);
}

// Accounting-style number formatters: negatives shown in red parentheses,
// e.g. ($1,234) instead of -$1,234. The negative wrapper uses an inline
// color so it works in any context (KPIs, tables, member cards).
const _NEG_OPEN  = '<span style="color:var(--negative)">(';
const _NEG_CLOSE = ')</span>';
const FMT_USD = v => {
  if (v == null || isNaN(v)) return '–';
  const n = Number(v);
  const abs = '$' + Math.abs(n).toLocaleString(undefined, {minimumFractionDigits: 0, maximumFractionDigits: 0});
  return n < 0 ? `${_NEG_OPEN}${abs}${_NEG_CLOSE}` : abs;
};
const FMT_USD2 = v => {
  if (v == null || isNaN(v)) return '–';
  const n = Number(v);
  const abs = '$' + Math.abs(n).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
  return n < 0 ? `${_NEG_OPEN}${abs}${_NEG_CLOSE}` : abs;
};
const FMT_PCT = v => {
  if (v == null || isNaN(v)) return '–';
  const pct = Number(v) * 100;
  const abs = Math.abs(pct).toFixed(1) + '%';
  return pct < 0 ? `${_NEG_OPEN}${abs}${_NEG_CLOSE}` : abs;
};
const FMT_NUM = v => {
  if (v == null || isNaN(v)) return '–';
  const n = Number(v);
  const abs = Math.abs(n).toLocaleString(undefined, {maximumFractionDigits: 2});
  return n < 0 ? `${_NEG_OPEN}${abs}${_NEG_CLOSE}` : abs;
};

// Batched 50 at a time with 1s between batches to stay within Finnhub's 60/min limit.
// Runs in the background — page is already rendered; badges fill in progressively.
async function fetchEtfConstituentPrices() {
  if (_fetchingPrices) return;
  _fetchingPrices = true;
  const etfData = state.etfHoldings || {};
  const already = new Set(Object.keys(state.livePrices));

  const totals = {};
  for (const constituents of Object.values(etfData)) {
    if (!Array.isArray(constituents)) continue;
    for (const c of constituents) {
      const t = (c.symbol || '').replace(' US', '').trim();
      if (!t || already.has(t) || t.length > 6 || t.startsWith('-')) continue;
      totals[t] = (totals[t] || 0) + (c.percent || 0);
    }
  }

  // Top 60 by weight, fired simultaneously — Finnhub returns as many as it can
  const top60 = Object.entries(totals).sort((a,b) => b[1]-a[1]).slice(0, 60).map(([t])=>t);
  if (!top60.length) { _fetchingPrices = false; return; }

  await Promise.all(top60.map(async ticker => {
    try {
      const r = await fetch(`https://finnhub.io/api/v1/quote?symbol=${ticker}&token=${FINNHUB_KEY}`);
      const d = await r.json();

        price: d.c, prevClose: d.pc, changePct: d.pc ? (d.c - d.pc) / d.pc : 0
      };
    } catch {}
  }));

  _fetchingPrices = false;
  if (state.wb) render();
}

// Background auto-refresh: silently try to pull fresh SPUS CSV via CORS proxy.
// Runs once on load. No user action needed. Fails silently if blocked.
async function autoRefreshSpus() {
  const SPUS_CSV = 'https://www.sp-funds.com/wp-content/uploads/data/TidalFG_Holdings_SPUS.csv';
  const PROXIES = [
    `https://corsproxy.io/?url=${encodeURIComponent(SPUS_CSV)}`,
    `https://api.allorigins.win/raw?url=${encodeURIComponent(SPUS_CSV)}`,
  ];
  for (const proxy of PROXIES) {
    try {
      const r = await fetch(proxy, { signal: AbortSignal.timeout(8000) });
      if (!r.ok) continue;
      const text = await r.text();
      const fresh = parseSpusCsv(text);
      if (fresh && fresh.length > 50) {
        state.etfHoldings = { ...state.etfHoldings, SPUS: fresh };
        state.etfHoldingsStatus = 'live';
        render();
        return; // success — stop trying proxies
      }
    } catch { /* proxy failed, try next */ }
  }
  // All proxies failed — hardcoded data is already in state, nothing to do
}

function parseSpusCsv(text) {
  const lines = text.trim().split('\n');
  if (lines.length < 2) return null;
  const headers = lines[0].split(',').map(h => h.trim());
  const tickerIdx  = headers.indexOf('StockTicker');
  const nameIdx    = headers.indexOf('SecurityName');
  const weightIdx  = headers.indexOf('Weightings');
  if (tickerIdx < 0 || weightIdx < 0) return null;
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const cols = lines[i].split(',');
    const ticker = (cols[tickerIdx] || '').trim();
    const pct    = parseFloat((cols[weightIdx] || '0').replace('%', ''));
    const name   = nameIdx >= 0 ? (cols[nameIdx] || ticker).trim() : ticker;
    if (!ticker || pct <= 0 || ticker === 'Cash&Other' || ticker.length > 10) continue;
    rows.push({ symbol: ticker, name, percent: Math.round(pct * 10000) / 10000 });
  }
  return rows.sort((a, b) => b.percent - a.percent);
}

// Returns true if US markets are currently open (Mon-Fri, 9:30-16:00 ET)
function isMarketOpen() {
  const now  = new Date();
  if (now.getDay() === 0 || now.getDay() === 6) return false; // weekend
  const nyTime = new Date(now.toLocaleString('en-US', { timeZone: 'America/New_York' }));
  const mins   = nyTime.getHours() * 60 + nyTime.getMinutes();
  return mins >= 570 && mins < 960; // 9:30 AM–4:00 PM ET
}

function sheetToRows(sheetName) {
  const ws = state.wb.Sheets[sheetName];
  if (!ws) return [];
  // blankrows:true keeps empty rows so positional indexing works (e.g., row gaps between member blocks).
  return XLSX.utils.sheet_to_json(ws, { header: 1, defval: null, raw: true, blankrows: true });
}

// XIRR via Newton-Raphson
function xirr(values, dates) {
  if (!values || values.length < 2) return null;
  let hasPos = false, hasNeg = false;
  for (const v of values) {
    if (v > 0) hasPos = true;
    if (v < 0) hasNeg = true;
  }
  if (!hasPos || !hasNeg) return null;
  const t0 = dates[0].getTime();
  const days = dates.map(d => (d.getTime() - t0) / 86400000);
  const npv = r => values.reduce((s, v, i) => s + v / Math.pow(1 + r, days[i] / 365), 0);
  const dnpv = r => values.reduce((s, v, i) => s - (v * days[i] / 365) / Math.pow(1 + r, days[i] / 365 + 1), 0);
  let r = 0.1;
  for (let i = 0; i < 200; i++) {
    const f = npv(r);
    const df = dnpv(r);
    if (Math.abs(df) < 1e-12) break;
    const r_new = r - f / df;
    if (!isFinite(r_new)) break;
    if (Math.abs(r_new - r) < 1e-10) return r_new;
    r = r_new;
    if (r < -0.99) r = -0.5;
    if (r > 100) r = 1;
  }
  return r;
}

// Robust Holdings parser: scans by member name in col B (index 1) and symbol/TOTAL in col C (index 2).
// Independent of row offsets or blank-row preservation.
function parseHoldings() {
  const rows = sheetToRows("Holdings");
  const out = { members: {}, byTicker: {}, total: null };
  for (const m of MEMBERS) {
    out.members[m] = { positions: [], cost: 0, mv: 0, gain: 0 };
  }
  for (const r of rows) {
    if (!r) continue;
    const member = r[1];   // col B
    const sym    = r[2];   // col C
    if (member === "PORTFOLIO" && sym === "TOTAL") {
      out.total = { cost: Number(r[5] || 0), mv: Number(r[6] || 0), gain: Number(r[7] || 0), gainPct: Number(r[8] || 0) };
      out._portfolioTotalRow = r;
      continue;
    }
    if (!MEMBERS.includes(member)) continue;
    if (sym === "TOTAL") {
      // Will be recomputed from positions after live prices are applied
      out.members[member]._costFromSheet = Number(r[5] || 0);
      continue;
    }
    if (sym == null) continue;
    const shares = Number(r[3] || 0);
    const cost   = Number(r[5] || 0);
    // Use live price if available, otherwise fall back to xlsx cached price
    const liveP  = state.livePrices?.[sym]?.price ?? state.livePrices?.[sym + '.L']?.price;
    const price  = liveP != null ? liveP : Number(r[4] || 0);
    const mv     = sym === 'Cash' ? Number(r[6] || 0) : shares * price;
    const gain   = mv - cost;
    out.members[member].positions.push({ symbol: sym, shares, price, cost, mv, gain });
    if (!out.byTicker[sym]) out.byTicker[sym] = { shares: 0, cost: 0, mv: 0, gain: 0, price };
    out.byTicker[sym].shares += shares;
    out.byTicker[sym].cost   += cost;
    out.byTicker[sym].mv     += mv;
    out.byTicker[sym].gain   += gain;
    out.byTicker[sym].price   = price;
  }

  // Recompute per-member and portfolio totals using live prices
  let portCost = 0, portMV = 0;
  for (const m of MEMBERS) {
    const mem = out.members[m];
    if (!mem) continue;
    mem.cost = mem.positions.reduce((s, p) => s + p.cost, 0);
    mem.mv   = mem.positions.reduce((s, p) => s + p.mv,   0);
    mem.gain = mem.mv - mem.cost;
    portCost += mem.cost;
    portMV   += mem.mv;
  }
  if (out.total) {
    out.total.mv      = portMV;
    out.total.cost    = portCost;
    out.total.gain    = portMV - portCost;
    out.total.gainPct = portCost ? (portMV - portCost) / portCost : 0;
  }
  return out;
}

// Robust Transactions parser: any row with a date in col B and a recognized type in col C is a transaction.
function parseTransactions() {
  // Per-member cash columns shift right with the 7-member layout (Madi..Sami):
  //   5-member layout: cash cols S..W → JS idx 18..22
  //   7-member layout: cash cols W..AC → JS idx 22..28
  // We dynamically locate the start by scanning the per-member header row for the
  // first MEMBERS-name cluster of MEMBERS.length consecutive cells — so the parser
  // tolerates either layout without code changes.
  const rows = sheetToRows("Transactions");
  const VALID_TYPES = new Set(["Buy", "Sell", "Dividend", "Deposit", "Withdraw", "Purification", "Adjustment"]);

  // Find the three section-start column indices (shares, cost, cash) by locating the
  // per-member sub-header row and recording where each member name appears.
  let shStart = -1, cbStart = -1, caStart = -1;
  for (const r of rows) {
    if (!r) continue;
    const memberSpans = [];
    for (let c = 0; c <= r.length - MEMBERS.length; c++) {
      if (MEMBERS.every((m, k) => r[c + k] === m)) memberSpans.push(c);
    }
    if (memberSpans.length >= 3) {
      [shStart, cbStart, caStart] = memberSpans.slice(0, 3);
      break;
    }
  }
  // Fallback to the 7-member positions if the header probe failed.
  if (caStart < 0) { shStart = 8; cbStart = 15; caStart = 22; }

  const out = [];
  for (const r of rows) {
    if (!r) continue;
    if (!r[1] || !VALID_TYPES.has(r[2])) continue;
    const cash = {};
    for (let i = 0; i < MEMBERS.length; i++) cash[MEMBERS[i]] = r[caStart + i];
    out.push({
      date: r[1], type: r[2], symbol: r[3],
      totalShares: r[4], price: r[5], totalCash: r[6], notes: r[7],
      cash,
    });
  }
  return out;
}

function computePerformance(txs, holdings) {
  const out = { members: {}, total: { netInvested: 0, mv: 0, profit: 0, return: 0, annualized: null } };
  for (const m of MEMBERS) {
    let net = 0;
    const cfValues = [];
    const cfDates = [];
    for (const t of txs) {
      if (t.type !== "Deposit" && t.type !== "Withdraw") continue;
      const v = Number(t.cash[m] || 0);
      if (v === 0) continue;
      net += v;
      cfValues.push(-v);
      cfDates.push(t.date instanceof Date ? t.date : new Date(t.date));
    }
    const mv = holdings.members[m]?.mv || 0;
    cfValues.push(mv);
    cfDates.push(new Date());
    const profit = mv - net;
    const ret = net !== 0 ? profit / net : 0;
    const ann = xirr(cfValues, cfDates);
    out.members[m] = { netInvested: net, mv, profit, return: ret, annualized: ann };
    out.total.netInvested += net;
    out.total.mv += mv;
  }
  out.total.profit = out.total.mv - out.total.netInvested;
  out.total.return = out.total.netInvested !== 0 ? out.total.profit / out.total.netInvested : 0;
  {
    const vMap = new Map();
    for (const t of txs) {
      if (t.type !== "Deposit" && t.type !== "Withdraw") continue;
      const dKey = (t.date instanceof Date ? t.date : new Date(t.date)).toISOString().slice(0,10);
      if (!vMap.has(dKey)) vMap.set(dKey, 0);
      let totalCash = 0;
      for (const m of MEMBERS) totalCash += Number(t.cash[m] || 0);
      vMap.set(dKey, vMap.get(dKey) + (-totalCash));
    }
    const sorted = [...vMap.entries()].sort();
    const vals = sorted.map(e => e[1]);
    const dts = sorted.map(e => new Date(e[0]));
    vals.push(out.total.mv);
    dts.push(new Date());
    out.total.annualized = xirr(vals, dts);
  }
  return out;
}

// ── Holdings formatters ──────────────────────────────────────────────────
// Whole-dollar amounts (no decimals for >= $1)
const FMT_$ = v => {
  if (v == null || isNaN(v)) return '–';
  const n = Number(v);
  const abs = '$' + Math.abs(n).toLocaleString(undefined, {minimumFractionDigits:0, maximumFractionDigits:0});
  return n < 0 ? `${_NEG_OPEN}${abs}${_NEG_CLOSE}` : abs;
};
// Price with 2 decimals — negative shown as ($X.XX) in red
const FMT_PRICE = v => {
  if (v == null || isNaN(v)) return '–';
  const n = Number(v);
  const abs = '$' + Math.abs(n).toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2});
  return n < 0 ? `${_NEG_OPEN}${abs}${_NEG_CLOSE}` : abs;
};
// Shares: whole if integer, up to 4 dp if fractional
const FMT_SH = v => {
  if (v == null || isNaN(v)) return '–';
  const n = Number(v);
  if (Math.abs(n - Math.round(n)) < 0.0005) return Math.round(n).toLocaleString();
  return n.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:4});
};
// Percentage with 2 dp, sign-coloured via CSS class (caller sets class)
const FMT_PCT2 = v => {
  if (v == null || isNaN(v)) return '–';
  const pct = Number(v) * 100;
  const abs = Math.abs(pct).toFixed(2) + '%';
  return pct < 0 ? `${_NEG_OPEN}${abs}${_NEG_CLOSE}` : abs;
};

function renderHoldings(holdings) {
  const totalMV = holdings.total?.mv || 1;
  const { col, dir } = state.holdingsSort;

  const sortVal = (sym, v) => {
    const lp = state.livePrices?.[sym];
    if (col === 'symbol')  return sym;
    if (col === 'shares')  return v.shares || 0;
    if (col === 'avgpx')   return v.shares > 0 ? (v.cost / v.shares) : 0;
    if (col === 'price')   return lp?.price || v.price || 0;
    if (col === 'daypct')  return lp?.changePct ?? -Infinity;
    if (col === 'mv')      return v.mv || 0;
    if (col === 'daypnl')  return (lp && sym !== 'Cash') ? v.shares * (lp.price - lp.prevClose) : -Infinity;
    if (col === 'gain')    return v.gain || 0;
    if (col === 'gainpct') return v.cost ? (v.gain / v.cost) : 0;
    return 0;
  };

  const cash = Object.entries(holdings.byTicker).filter(([s]) => s === 'Cash');
  const stocks = Object.entries(holdings.byTicker)
    .filter(([s, v]) => s !== 'Cash' && Math.abs(v.mv || 0) > 0.01)
    .sort((a, b) => {
      const va = sortVal(a[0], a[1]);
      const vb = sortVal(b[0], b[1]);
      if (col === 'symbol') return dir === 'asc' ? va.localeCompare(vb) : vb.localeCompare(va);
      return dir === 'asc' ? va - vb : vb - va;
    });

  // Compute totalDayPnl over ALL stocks (not just visible rows)
  let totalDayPnl = 0;
  stocks.forEach(([sym, v]) => {
    const lp = state.livePrices?.[sym];
    if (lp != null) totalDayPnl += v.shares * (lp.price - lp.prevClose);
  });

  // Visible rows: top 10 stocks when collapsed, all when expanded; cash always shown
  const COLLAPSE_AT = 10;
  const visibleStocks = state.holdingsExpanded ? stocks : stocks.slice(0, COLLAPSE_AT);
  const tickers = [...visibleStocks, ...cash];

  const rows = tickers.map(([sym, v]) => {
    const gain    = v.gain || 0;
    const cost    = v.cost || 0;
    const gainPct = (sym !== 'Cash' && cost) ? gain / cost : null;
    const cls     = gain >= 0 ? 'pos' : 'neg';
    const avgPx   = (sym !== 'Cash' && v.shares > 0) ? cost / v.shares : null;

    // Daily change from live prices
    const lp         = state.livePrices?.[sym];
    const dayChgPct  = lp?.changePct ?? null;
    const dayPnl     = (sym !== 'Cash' && lp != null) ? v.shares * (lp.price - lp.prevClose) : null;
    const dayCls     = (dayChgPct ?? 0) >= 0 ? 'pos' : 'neg';

    // Per-share daily price change
    const dayChgPerShare = (lp != null && sym !== 'Cash') ? (lp.price - lp.prevClose) : null;

    if (sym === 'Cash') {
      return `<tr>
        <td><strong>Cash</strong></td>
        <td class="num">–</td><td class="num">–</td><td class="num">–</td>
        <td class="num">–</td><td class="num">–</td>
        <td class="num" style="font-weight:700;font-size:14px">${FMT_$(v.mv)}</td>
        <td class="num">–</td><td class="num">–</td><td class="num">–</td>
      </tr>`;
    }
    // Extended hours badge for the live price cell
    const extTag = lp?.isExtended
      ? `<span class="ext-badge ${lp.session === 'premarket' ? 'pre' : 'ah'}">${lp.session === 'premarket' ? 'PRE' : 'AH'}</span>`
      : '';
    const livePrice = lp ? FMT_PRICE(lp.price) + extTag : FMT_PRICE(v.price);
    return `<tr>
      <td><strong>${sym}</strong></td>
      <td class="num">${FMT_SH(v.shares)}</td>
      <td class="num">${avgPx != null ? FMT_PRICE(avgPx) : '–'}</td>
      <td class="num">${livePrice}</td>
      <td class="num ${dayCls}">${dayChgPerShare != null ? FMT_PRICE(dayChgPerShare) : '–'}</td>
      <td class="num">${dayChgPct != null ? `<span class="day-badge ${dayCls}">${dayChgPct >= 0 ? '▲' : '▼'} ${Math.abs(dayChgPct * 100).toFixed(2)}%</span>` : '–'}</td>
      <td class="num" style="font-weight:700;font-size:14px">${FMT_$(v.mv)}</td>
      <td class="num ${dayCls}">${dayPnl != null ? FMT_$(dayPnl) : '–'}</td>
      <td class="num ${cls}" style="font-weight:700;font-size:14px">${FMT_$(gain)}</td>
      <td class="num ${cls}" style="font-weight:700;font-size:14px">${gainPct == null ? '–' : FMT_PCT2(gainPct)}</td>
    </tr>`;
  }).join('');

  const totalGain    = holdings.total?.gain || 0;
  const totalCost    = holdings.total?.cost || 0;
  const totalGainPct = totalCost ? totalGain / totalCost : null;
  const totalCls     = totalGain    >= 0 ? 'pos' : 'neg';
  const totalDayCls  = totalDayPnl  >= 0 ? 'pos' : 'neg';

  return `
    <div class="section">
      <h2>What We Own</h2>
      <div class="section-sub">Live prices · Day Chg and Day P&L update in real time.</div>
      <div class="table-card holdings-table-card">
        <table>
          <thead><tr>${[
            ['symbol','Symbol',''],
            ['shares','Shares','num'],
            ['avgpx','Avg Price','num'],
            ['price','Last Price','num'],
            ['daychg','Day Chg $','num'],
            ['daypct','Day %','num'],
            ['mv','Mkt Value','num'],
            ['daypnl','Day P&L','num'],
            ['gain','Unreal. P&L','num'],
            ['gainpct','Unreal. %','num'],
          ].map(([c, label, cls]) => {
            const active = state.holdingsSort.col === c;
            const arrow  = active ? (state.holdingsSort.dir === 'desc' ? ' ↓' : ' ↑') : '';
            const style  = `cursor:pointer;user-select:none;white-space:nowrap;${active ? 'color:var(--ink)' : ''}`;
            return `<th class="${cls}" style="${style}" onclick="setHoldingsSort('${c}')">${label}${arrow}</th>`;
          }).join('')}</tr></thead>
          <tbody>${rows}
            <tr class="total">
              <td>Total</td>
              <td></td><td></td><td></td><td></td><td></td>
              <td class="num">${FMT_$(holdings.total?.mv || 0)}</td>
              <td class="num ${totalDayCls}">${totalDayPnl ? FMT_$(totalDayPnl) : '–'}</td>
              <td class="num ${totalCls}">${FMT_$(totalGain)}</td>
              <td class="num ${totalCls}">${totalGainPct == null ? '–' : FMT_PCT2(totalGainPct)}</td>
            </tr>
          </tbody>
        </table>
      </div>
      ${stocks.length > COLLAPSE_AT ? `
        <button onclick="toggleHoldingsExpand()" style="
          display:block; margin: 12px auto 0; padding: 7px 20px;
          background:transparent; border:1px solid var(--line);
          border-radius:20px; color:var(--muted); font-size:13px;
          cursor:pointer; transition: border-color 0.15s, color 0.15s;"
          onmouseover="this.style.borderColor='var(--accent)';this.style.color='var(--accent)'"
          onmouseout="this.style.borderColor='var(--line)';this.style.color='var(--muted)'">
          ${state.holdingsExpanded
            ? '↑ Show top 10 only'
            : `↓ Show all ${stocks.length} holdings`}
        </button>` : ''}
    </div>
  `;
}

// Patch only the Day % column in the look-through table — no full re-render
function patchLtDayBadges() {
  const h2 = Array.from(document.querySelectorAll('.section h2'))
    .find(el => el.textContent.includes('Really Own'));
  if (!h2) return;
  const rows = h2.closest('.section').querySelectorAll('tbody tr');
  rows.forEach(row => {
    const cells = row.querySelectorAll('td');

    if (!ticker) return;
    const lp = state.livePrices?.[ticker];
    const dayChgPct = lp?.changePct ?? null;
    if (dayChgPct === null) return; // don't overwrite existing '–' with nothing
    const cls = dayChgPct >= 0 ? 'pos' : 'neg';
    cells[5].innerHTML = `<span class="day-badge ${cls}">${dayChgPct >= 0 ? '▲' : '▼'} ${Math.abs(dayChgPct * 100).toFixed(2)}%</span>`;
  });
}

function renderLookThrough(holdings) {
  const status = state.etfHoldingsStatus;
  const etfData = state.etfHoldings || {};

  // Member selector options
  const memberOptions = ['All Members', ...MEMBERS]
    .map(m => `<option value="${m}">${m}</option>`).join('');

  // Selected member from a stable DOM element (persisted between renders)
  const selectedMember = document.getElementById('lt-member-select')?.value || 'All Members';

  // ── Compute ETF market values for selected member/all ──
  function getMV(sym) {
    if (selectedMember === 'All Members') {
      return holdings.byTicker[sym]?.mv || 0;
    }
    const pos = holdings.members[selectedMember]?.positions?.find(p => p.symbol === sym);
    return pos?.mv || 0;
  }

  const totalPortfolioMV = selectedMember === 'All Members'
    ? (holdings.total?.mv || 1)
    : (holdings.members[selectedMember]?.mv || 1);

  // ── Build look-through rows ──
  // Map: ticker → { name, smhExposure, spusExposure, iauExposure, total }
  const exposure = {};

  function addExposure(sym, etfMV) {
    const constituents = etfData[sym];
    if (!constituents) return;
    for (const c of constituents) {
      const ticker = c.symbol?.replace(' US', '').trim() || c.name;
      if (!ticker || c.assetClass === 'Cash' || ticker.startsWith('-')) continue;
      const pct = (c.percent ?? c.weight ?? 0) / 100;
      if (pct <= 0) continue;
      if (!exposure[ticker]) exposure[ticker] = { name: c.name || ticker, smh: 0, spus: 0, total: 0 };
      exposure[ticker][sym.toLowerCase()] = (exposure[ticker][sym.toLowerCase()] || 0) + etfMV * pct;
      exposure[ticker].total += etfMV * pct;
    }
  }

  addExposure('SMH',  getMV('SMH'));
  addExposure('SPUS', getMV('SPUS'));

  // Sort by ltSort state
  const { col: ltCol, dir: ltDir } = state.ltSort;
  const ltSortVal = (ticker, v) => {
    const lp = state.livePrices?.[ticker];
    if (ltCol === 'ticker')  return ticker;
    if (ltCol === 'pct')     return totalPortfolioMV > 0 ? v.total / totalPortfolioMV : 0;
    if (ltCol === 'total')   return v.total;
    if (ltCol === 'daypct')  return lp?.changePct ?? -Infinity;
    if (ltCol === 'smh')     return v.smh;
    if (ltCol === 'spus')    return v.spus;
    return v.total;
  };
  const sorted = Object.entries(exposure).sort((a, b) => {
    const va = ltSortVal(a[0], a[1]), vb = ltSortVal(b[0], b[1]);
    if (ltCol === 'ticker') return ltDir === 'asc' ? va.localeCompare(vb) : vb.localeCompare(va);
    return ltDir === 'asc' ? va - vb : vb - va;
  });

  // ── Status line ──
  let statusHtml = '';

  const smhCount  = etfData.SMH?.length  || 0;
  const spusCount = etfData.SPUS?.length || 0;
  if (status === 'idle' || status === 'loading') {
    statusHtml = `<span class="lookthrough-status loading">⏳ Loading…</span>`;
  } else {
    const spusLabel = status === 'live'
      ? `SPUS ${spusCount} stocks (live)`
      : `SPUS ${spusCount} stocks (Jun 2026)`;
    statusHtml = `<span class="lookthrough-status">✓ SMH ${smhCount} stocks · ${spusLabel}</span>`;
  }

  // Split by price availability
  const withPrice    = sorted.filter(([t]) => state.livePrices?.[t]);
  const withoutPrice = sorted.filter(([t]) => !state.livePrices?.[t]);

  // View-specific sort
  const COLLAPSE_AT = 10;
  const ltView = state.ltView || 'weight';
  let viewRows;
  if (ltView === 'gainers') {
    viewRows = [...withPrice].sort((a, b) =>
      (state.livePrices[b[0]]?.changePct ?? -Infinity) - (state.livePrices[a[0]]?.changePct ?? -Infinity));
  } else if (ltView === 'losers') {
    viewRows = [...withPrice].sort((a, b) =>
      (state.livePrices[a[0]]?.changePct ?? Infinity) - (state.livePrices[b[0]]?.changePct ?? Infinity));
  } else {
    viewRows = withPrice; // weight: already sorted by ltSort
  }
  const visibleRows = state.ltExpanded ? viewRows : viewRows.slice(0, COLLAPSE_AT);

  const tableRows = visibleRows.map(([ticker, v], i) => {
    const pctOfPortfolio = totalPortfolioMV > 0 ? v.total / totalPortfolioMV : 0;
    const lp = state.livePrices?.[ticker];
    const dayChgPct = lp?.changePct ?? null;
    const dayCls = (dayChgPct ?? 0) >= 0 ? 'pos' : 'neg';
    const dayBadge = dayChgPct != null
      ? `<span class="day-badge ${dayCls}">${dayChgPct >= 0 ? '▲' : '▼'} ${Math.abs(dayChgPct * 100).toFixed(2)}%</span>`
      : '–';
    return `<tr>
      <td style="color:var(--muted);font-size:12px">${i + 1}</td>
      <td><strong>${ticker}</strong></td>
      <td style="color:var(--ink-soft);font-size:13px">${v.name || ''}</td>
      <td class="num" style="font-weight:700">${(pctOfPortfolio * 100).toFixed(2)}%</td>
      <td class="num" style="font-weight:700">${FMT_$(v.total)}</td>
      <td class="num">${dayBadge}</td>
      <td class="num">
        ${v.smh > 0.5 ? `<div>${FMT_$(v.smh)}</div><div><span class="lookthrough-tag tag-smh">SMH</span></div>` : '–'}

      </div>

      <!-- View tabs -->
      <div style="display:flex;gap:8px;margin:16px 0 12px">
        ${tabBtn('weight', 'By Weight')}
        ${tabBtn('gainers', '▲ Top Gainers')}
        ${tabBtn('losers', '▼ Top Losers')}
      </div>

      <div class="table-card holdings-table-card">
        <table>
          <thead><tr>
            <th style="width:24px;text-align:center">#</th>
            ${[
              ['ticker','Ticker','58px'],
              ['company','Company','100px'],
              ['pct','% of Portfolio','88px'],

              ['daypct','Day %','80px'],

            ].map(([c, label, w]) => {
              const active = state.ltSort.col === c && ltView === 'weight';

              const style = `width:${w};text-align:center;${clickable ? 'cursor:pointer;user-select:none;' : ''}${active ? 'color:var(--ink)' : ''}`;
              return `<th style="${style}"${clickable ? ` onclick="setLtSort('${c}')"` : ''}>${label}${arrow}</th>`;
            }).join('')}
          </tr></thead>
          <tbody>
            ${tableRows}
            ${ltView === 'weight' ? (() => {
              if (!withoutPrice.length) return '';
              const othPct   = withoutPrice.reduce((s,[,v]) => s + (totalPortfolioMV > 0 ? v.total/totalPortfolioMV : 0), 0);
              const othTotal = withoutPrice.reduce((s,[,v]) => s + v.total, 0);
              const othSmh   = withoutPrice.reduce((s,[,v]) => s + (v.smh  || 0), 0);

                <td class="num">–</td>

                <td class="num">${othSpus > 0.5 ? `<div>${FMT_$(othSpus)}</div><div><span class="lookthrough-tag tag-spus">SPUS</span></div>` : '–'}</td>

      ${viewRows.length > COLLAPSE_AT ? `

let _ltDonutChart = null;

// Donut center plugin: float total value in the donut hole
const donutCenterPlugin = {
  id: 'donutCenter',
  beforeDraw(chart) {
    const opts = chart.options.plugins?.donutCenter;
    if (!opts || !opts.enabled) return;
    const { ctx, chartArea } = chart;
    const tc = themeColors();
    const total = opts.customTotal !== undefined
      ? opts.customTotal
      : chart.data.datasets[0].data.reduce((a, b) => a + (Number(b) || 0), 0);
    const cx = (chartArea.left + chartArea.right) / 2;
    const cy = (chartArea.top + chartArea.bottom) / 2;
    ctx.save();
    ctx.fillStyle = tc.muted;
    ctx.font = '600 10px ' + (opts.bodyFont || '"Helvetica Neue", Arial, sans-serif');
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.letterSpacing = '1.5px';
    ctx.fillText(opts.label || 'TOTAL VALUE', cx, cy - 18);
    ctx.fillStyle = tc.ink;
    ctx.font = '700 24px "Playfair Display", Georgia, serif';
    ctx.fillText('$' + Math.round(total).toLocaleString(), cx, cy + 8);
    ctx.restore();
  }
};

// Build a vertical gradient for a chart, top→bottom (used by stacked bars)
function makeVerticalGradient(ctx, chartArea, top, bottom) {
  if (!chartArea) return top;
  const g = ctx.createLinearGradient(0, chartArea.top, 0, chartArea.bottom);
  g.addColorStop(0, top); g.addColorStop(1, bottom);
  return g;
}
// Build a horizontal gradient for a chart, left→right (for horizontal bars)
function makeHorizontalGradient(ctx, chartArea, start, end) {
  if (!chartArea) return start;
  const g = ctx.createLinearGradient(chartArea.left, 0, chartArea.right, 0);
  g.addColorStop(0, start); g.addColorStop(1, end);
  return g;
}

// Count-up animation for headline KPIs
function animateNumber(el, target, duration, formatter) {
  // innerHTML so the negative-parens span from the formatters renders styled
  const t0 = performance.now();
  function tick(now) {
    const p = Math.min((now - t0) / duration, 1);
    const eased = 1 - Math.pow(1 - p, 3); // ease-out cubic
    el.innerHTML = formatter(target * eased);
    if (p < 1) requestAnimationFrame(tick);
    else el.innerHTML = formatter(target);
  }
  requestAnimationFrame(tick);
}

function renderCharts(perf, holdings, txs) {
  while (chartInstances.length) { try { chartInstances.pop().destroy(); } catch(e) {} }
  setTimeout(() => {
    // Render an HTML legend next to a donut canvas. CSS handles all the layout
    // and resize behavior — no Chart.js layout recalculation involved.
    function renderHtmlLegend(legendEl, labels, data, colors) {
      if (!legendEl) return;
      const total = data.reduce((a, b) => a + (Number(b) || 0), 0);
      legendEl.innerHTML = labels.map((label, i) => {
        const v = Number(data[i]) || 0;
        const pct = total ? (v / total) * 100 : 0;
        const color = Array.isArray(colors) ? colors[i] : colors;
        return `<li>
          <span class="swatch" style="background:${color}"></span>
          <span class="legend-label">${label}</span>
          <span class="legend-pct">${pct.toFixed(1)}%</span>
        </li>`;
      }).join('');
    }

    const donutOptions = {
      maintainAspectRatio: false,
      responsive: true,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: (ctx) => {
              const v = ctx.parsed;
              const total = ctx.dataset.data.reduce((a, b) => a + b, 0);
              const pct = total ? (v / total) * 100 : 0;
              return `${ctx.label}: $${v.toLocaleString(undefined, {maximumFractionDigits:0})} (${pct.toFixed(1)}%)`;
            }
          }
        }
      },
      cutout: '68%',
      layout: { padding: { left: 4, right: 4, top: 8, bottom: 8 } },
      animation: { animateRotate: true, animateScale: false, duration: 900, easing: 'easeOutQuart' }
    };
    // Enable the donut-center value display
    donutOptions.plugins.donutCenter = { enabled: true };
    const tc = themeColors();
    const memCtx = document.getElementById('memberChart');
    if (memCtx) {
      const memberData = MEMBERS.map(m => perf.members[m].mv || 0);
      chartInstances.push(new Chart(memCtx, {
        type: 'doughnut',
        data: {
          labels: MEMBERS,
          datasets: [{
            data: memberData,
            backgroundColor: COLORS_MEMBER, borderWidth: 2, borderColor: tc.paper
          }]
        },
        options: donutOptions,
        plugins: [donutCenterPlugin]
      }));
      renderHtmlLegend(document.getElementById('memberLegend'), MEMBERS, memberData, COLORS_MEMBER);
    }
    const posCtx = document.getElementById('positionChart');
    if (posCtx) {
      const tickers = Object.entries(holdings.byTicker)
        .filter(([k, v]) => Math.abs(v.mv || 0) > 0.01)
        .sort((a, b) => (b[1].mv || 0) - (a[1].mv || 0));
      const posLabels = tickers.map(t => t[0]);
      const posData = tickers.map(t => t[1].mv);
      const posColors = COLORS_ASSET.slice(0, posLabels.length);
      chartInstances.push(new Chart(posCtx, {
        type: 'doughnut',
        data: {
          labels: posLabels,
          datasets: [{
            data: posData,
            backgroundColor: posColors, borderWidth: 2, borderColor: tc.paper
          }]
        },
        options: donutOptions,
        plugins: [donutCenterPlugin]
      }));
      renderHtmlLegend(document.getElementById('positionLegend'), posLabels, posData, posColors);
    }
    // Unrealized P/L horizontal bar
    const plCtx = document.getElementById('plChart');
    if (plCtx) {
      const tickers = Object.entries(holdings.byTicker)
        .filter(([k, v]) => k !== 'Cash' && Math.abs(v.mv || 0) > 0.01)
        .sort((a, b) => (b[1].gain || 0) - (a[1].gain || 0));
      // Asymmetric, data-driven x-axis on a $5,000 grid. The axis extends to
      // two tick-steps beyond the largest gain (and below the largest loss),
      // so a +$32,475 gain stretches to a $40K tick and a -$200 loss extends
      // the negative side to -$10K. Gridlines stay subtle (lineSoft for ticks,
      // muted for zero) and render behind the bars for a clean look. Sides
      // with no bars collapse to a thin gutter.
      const gains = tickers.map(t => t[1].gain || 0);
      const posMax = Math.max(0, ...gains);
      const negMin = Math.min(0, ...gains);
      const hasPos = posMax > 0;
      const hasNeg = negMin < 0;
      const STEP = 5000;
      const xMax = hasPos ? Math.floor(posMax / STEP) * STEP + 2 * STEP : 0;
      const xMin = hasNeg ? Math.ceil(negMin / STEP)  * STEP - 2 * STEP : 0;
      const padLeft  = hasNeg ? 20 : 8;
      const padRight = hasPos ? 20 : 8;
      const plTc = themeColors();
      chartInstances.push(new Chart(plCtx, {
        type: 'bar',
        data: {
          labels: tickers.map(t => t[0]),
          datasets: [{
            data: tickers.map(t => t[1].gain || 0),
            backgroundColor: function(c) {
              const chart = c.chart; const { ctx, chartArea } = chart;
              if (!chartArea) return plTc.positive;
              const v = tickers[c.dataIndex]?.[1]?.gain || 0;
              return v >= 0
                ? makeHorizontalGradient(ctx, chartArea, plTc.posBarStart, plTc.posBarEnd)
                : makeHorizontalGradient(ctx, chartArea, plTc.negBarStart, plTc.negBarEnd);
            },
            borderWidth: 0,
            borderRadius: 4,
            barThickness: 28
          }]
        },
        options: {
          indexAxis: 'y',
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: (ctx) => {
                  const v = ctx.parsed.x;
                  const t = holdings.byTicker[ctx.label];
                  const pct = t.cost ? (v / t.cost) * 100 : 0;
                  const dollarStr = v >= 0
                    ? '+$' + v.toLocaleString(undefined, {maximumFractionDigits:0})
                    : '($' + Math.abs(v).toLocaleString(undefined, {maximumFractionDigits:0}) + ')';
                  const pctStr = pct >= 0
                    ? '+' + pct.toFixed(1) + '%'
                    : '(' + Math.abs(pct).toFixed(1) + '%)';
                  return `${ctx.label}: ${dollarStr} (${pctStr})`;
                }
              }
            }
          },
          scales: {
            x: {
              min: xMin, max: xMax,
              grid: { color: (ctx) => ctx.tick.value === 0 ? plTc.muted : plTc.lineSoft },
              ticks: {
                stepSize: STEP,
                callback: (v) => '$' + v.toLocaleString(undefined, {maximumFractionDigits:0}),
                font: { size: 11 },
                color: plTc.muted
              }
            },
            y: { grid: { display: false }, ticks: { font: { size: 13, weight: 'bold' }, color: plTc.ink } }
          },
          layout: { padding: { right: padRight, left: padLeft } }
        },
        // Custom inline plugin: two-line label ($ on top, % beneath in muted grey) at the bar end.
        // Defined here for closure access to `tickers` (for cost-basis lookup → percentage).
        // Negatives use accounting style: red parentheses, e.g. ($1,234) / (4.5%).
        plugins: [{
          id: 'plBarLabels',
          afterDatasetsDraw(chart) {
            const { ctx, data } = chart;
            const tcLbl = themeColors();
            const meta = chart.getDatasetMeta(0);
            meta.data.forEach((bar, i) => {
              const value = Number(data.datasets[0].data[i]) || 0;
              const cost = tickers[i]?.[1]?.cost || 0;
              const pct = cost ? (value / cost) * 100 : 0;
              const dollarStr = value >= 0
                ? '+$' + value.toLocaleString(undefined, { maximumFractionDigits: 0 })
                : '($' + Math.abs(value).toLocaleString(undefined, { maximumFractionDigits: 0 }) + ')';
              const pctStr = pct >= 0
                ? '+' + pct.toFixed(1) + '%'
                : '(' + Math.abs(pct).toFixed(1) + '%)';
              const x = bar.x + (value >= 0 ? 8 : -8);
              const align = value >= 0 ? 'left' : 'right';
              ctx.save();
              ctx.textAlign = align;
              // $ value on top — ink for positive, accounting red for negative
              ctx.fillStyle = value >= 0 ? tcLbl.ink : tcLbl.negative;
              ctx.font = 'bold 12px -apple-system, "Helvetica Neue", Arial, sans-serif';
              ctx.textBaseline = 'alphabetic';
              ctx.fillText(dollarStr, x, bar.y - 1);
              // % below — muted for positive, softer red for negative
              ctx.fillStyle = pct >= 0 ? tcLbl.muted : tcLbl.negative;
              ctx.font = '500 10.5px -apple-system, "Helvetica Neue", Arial, sans-serif';
              ctx.textBaseline = 'top';
              ctx.fillText(pctStr, x, bar.y + 3);
              ctx.restore();
            });
          }
        }]
      }));
    }

    // ─── Member: stacked horizontal bar (Cash Invested + Growth = Current Value) ───
    const compareCtx = document.getElementById('memberCompareChart');
    if (compareCtx) {
      // Format helpers: full $X,XXX when there's room; compact $X.XK for narrow segments.
      const fmtFull = v => '$' + v.toLocaleString(undefined, { maximumFractionDigits: 0 });
      const fmtCompact = v => {
        const a = Math.abs(v);
        if (a >= 10000) return '$' + Math.round(a / 1000) + 'K';
        if (a >= 1000)  return '$' + (a / 1000).toFixed(1) + 'K';
        return '$' + Math.round(a);
      };
      // Label each segment with its $ value inside (white text), and the total at the bar end.
      // Wide segments → full format. Medium → compact $X.XK. Tiny segments fall through to the
      // bar-end label (which adds the breakdown so Madi/Mama still get their numbers shown).
      const stackedLabelsPlugin = {
        id: 'stackedLabels',
        afterDatasetsDraw(chart) {
          const { ctx, data, scales } = chart;
          const tcSL = themeColors();
          const x0 = scales.x.getPixelForValue(0);
          data.datasets.forEach((ds, di) => {
            const meta = chart.getDatasetMeta(di);
            meta.data.forEach((bar, i) => {
              const v = Number(ds.data[i]) || 0;
              if (v <= 0) return;
              let segStart;
              if (di === 0) segStart = x0;
              else segStart = chart.getDatasetMeta(di - 1).data[i].x;
              const segWidth = bar.x - segStart;
              const sign = di === 1 ? '+' : '';
              let text = null;
              if (segWidth >= 58) text = sign + fmtFull(v);
              else if (segWidth >= 28) text = sign + fmtCompact(v);
              if (!text) return;   // segment too narrow even for compact label
              const centerX = (segStart + bar.x) / 2;
              ctx.save();
              ctx.fillStyle = 'white';
              ctx.font = 'bold 11px -apple-system, "Helvetica Neue", Arial, sans-serif';
              ctx.textBaseline = 'middle';
              ctx.textAlign = 'center';
              ctx.fillText(text, centerX, bar.y);
              ctx.restore();
            });
          });
          // Total label at end of bar. For very narrow bars we also append a compact
          // breakdown so Madi/Mama always have their numbers visible somewhere.
          const lastMeta = chart.getDatasetMeta(data.datasets.length - 1);
          lastMeta.data.forEach((bar, i) => {
            const cash = Number(data.datasets[0].data[i]) || 0;
            const growth = Number(data.datasets[1]?.data[i]) || 0;
            const total = cash + growth;
            // Check if EITHER segment was too small to get an inline label (under 28px).
            // If so, append the breakdown to the bar-end label.
            const x0 = scales.x.getPixelForValue(0);
            const cashEnd = chart.getDatasetMeta(0).data[i].x;
            const cashSegWidth  = cashEnd - x0;
            const growthSegWidth = bar.x - cashEnd;
            const cashHidden   = cashSegWidth   < 28;
            const growthHidden = growthSegWidth < 28;

            ctx.save();
            ctx.fillStyle = tcSL.ink;
            ctx.font = 'bold 12px -apple-system, "Helvetica Neue", Arial, sans-serif';
            ctx.textBaseline = 'middle';
            ctx.textAlign = 'left';
            const totalText = '  $' + total.toLocaleString(undefined, { maximumFractionDigits: 0 });
            ctx.fillText(totalText, bar.x, bar.y);
            // Append compact breakdown only when an inline label was skipped
            if (cashHidden || growthHidden) {
              const totalWidth = ctx.measureText(totalText).width;
              const cashStr = fmtCompact(cash);
              const growthStr = '+' + fmtCompact(growth);
              const breakdown = `   (${cashStr} in, ${growthStr})`;
              ctx.fillStyle = tcSL.muted;
              ctx.font = '500 11px -apple-system, "Helvetica Neue", Arial, sans-serif';
              ctx.fillText(breakdown, bar.x + totalWidth, bar.y);
            }
            ctx.restore();
          });
        }
      };
      const cmpTc = themeColors();
      chartInstances.push(new Chart(compareCtx, {
        type: 'bar',
        data: {
          labels: MEMBERS,
          datasets: [
            {
              label: 'Cash Invested',
              data: MEMBERS.map(m => perf.members[m].netInvested || 0),
              backgroundColor: function(c) {
                const { ctx, chartArea } = c.chart;
                return makeHorizontalGradient(ctx, chartArea, cmpTc.cashBarStart, cmpTc.cashBarEnd);
              },
              borderWidth: 0
            },
            {
              label: 'Growth',
              data: MEMBERS.map(m => (perf.members[m].mv || 0) - (perf.members[m].netInvested || 0)),
              backgroundColor: function(c) {
                const { ctx, chartArea } = c.chart;

// cards, tooltips, and active-benchmark logic all adapt automatically.

function renderBenchmark() {
  // Build a "vs. X · Y · Z" string from whatever benchmarks are in the
  // registry so the heading stays accurate when benchmarks are added/removed.
  const names = BENCHMARKS.map(b => b.label).join(' · ');
  return `
    <div class="section" id="benchmarkSection">
      <h2>Portfolio vs. Benchmarks</h2>
      <div class="section-sub">Time-weighted return since inception (Feb 2022) — normalised to $100. Comparing against ${names}. Portfolio = SPUS/IAU blend pre-2026, exact holdings post-Mar 2026.</div>
      <div class="benchmark-periods">
        <button class="period-btn" data-period="1m"        onclick="setBenchmarkPeriod('1m')">1 Month</button>
        <button class="period-btn" data-period="3m"        onclick="setBenchmarkPeriod('3m')">3 Months</button>
        <button class="period-btn" data-period="ytd"       onclick="setBenchmarkPeriod('ytd')">YTD</button>
        <button class="period-btn" data-period="1y"        onclick="setBenchmarkPeriod('1y')">1 Year</button>
        <button class="period-btn active" data-period="inception" onclick="setBenchmarkPeriod('inception')">Since Inception</button>
      </div>
      <div class="benchmark-summary" id="benchmarkSummary"></div>
      <div class="chart-card">
        <div class="chart-wrap" style="height:340px"><canvas id="benchmarkChart"></canvas></div>
      </div>
      <div class="benchmark-note" id="benchmarkNote"></div>
    </div>`;
}

let _bmChart = null;
let _bmPeriod = 'inception';

function setBenchmarkPeriod(period) {
  _bmPeriod = period;
  // Active state via data-period attr — robust to label/text changes.
  document.querySelectorAll('.period-btn').forEach(b => {
    b.classList.toggle('active', b.getAttribute('data-period') === period);
  });
  renderBenchmarkChart();
}

// Slice the portfolio series and every benchmark in BENCHMARKS down to
// the selected period and renormalise to 100 at the period start.
// Returns { dates, port, series: [{key,label,longLabel,color,dash,data}, …] }.
function getPeriodSlice(period) {
  const today = BENCHMARK_DATES[BENCHMARK_DATES.length - 1];
  const [ty, tm, td] = today.split('-').map(Number);
  let startD;
  if (period === 'inception') startD = BENCHMARK_DATES[0];
  else if (period === 'ytd')   startD = `${ty}-01-01`;
  else if (period === '1y')    startD = `${ty-1}-${String(tm).padStart(2,'0')}-${String(td).padStart(2,'0')}`;
  else if (period === '3m') {
    let m = tm - 3, y = ty;
    if (m <= 0) { m += 12; y--; }
    startD = `${y}-${String(m).padStart(2,'0')}-${String(td).padStart(2,'0')}`;
  } else if (period === '1m') {
    let m = tm - 1, y = ty;
    if (m <= 0) { m += 12; y--; }
    startD = `${y}-${String(m).padStart(2,'0')}-${String(td).padStart(2,'0')}`;
  }
  const idx = BENCHMARK_DATES.findIndex(d => d >= startD);
  const start = idx < 0 ? 0 : idx;
  const dates = BENCHMARK_DATES.slice(start);
  const portSlice = BENCHMARK_PORT.slice(start);
  const p0 = portSlice[0];
  const port = portSlice.map(v => +(v / p0 * 100).toFixed(2));
  const series = BENCHMARKS.map(b => {
    const slice = b.data.slice(start);
    const b0 = slice[0];
    return {
      key: b.key, label: b.label, longLabel: b.longLabel,
      color: b.color, dash: b.dash,
      data: slice.map(v => +(v / b0 * 100).toFixed(2))
    };
  });
  return { dates, port, series };
}

function renderBenchmarkChart() {
  const { dates, port, series } = getPeriodSlice(_bmPeriod);
  const portRet = +(port[port.length-1] - 100).toFixed(2);
  const sign    = v => v >= 0 ? 'pos' : 'neg';
  const fmt     = v => (v >= 0 ? '+' : '') + v.toFixed(1) + '%';

  // Summary: portfolio card first, then one card per benchmark showing
  // its return + alpha-vs-portfolio delta beneath. Coloured label dot
  // matches the chart line so the eye can connect card ↔ line instantly.
  const portCard = `
    <div class="bm-stat">
      <span class="bm-stat-label" style="color:var(--accent);font-weight:600">Portfolio</span>
      <span class="bm-stat-value ${sign(portRet)}">${fmt(portRet)}</span>
      <span class="bm-stat-delta">total return this period</span>
    </div>`;
  const bmCards = series.map(s => {
    const ret   = +(s.data[s.data.length - 1] - 100).toFixed(2);
    const alpha = +(portRet - ret).toFixed(2);
    return `
      <div class="bm-stat">
        <span class="bm-stat-label" style="color:${s.color}; font-weight:600">${s.longLabel}</span>
        <span class="bm-stat-value ${sign(ret)}">${fmt(ret)}</span>
        <span class="bm-stat-delta ${sign(alpha)}">${fmt(alpha)} vs ${s.label}</span>
      </div>`;
  }).join('');
  document.getElementById('benchmarkSummary').innerHTML = portCard + bmCards;

  const note = _bmPeriod === 'inception'
    ? `Pre-2026: blended SPUS 76% + IAU 24% proxy. Post-Mar 2026: exact holdings. Inception: Feb 22, 2022.`
    : `Growth of $100 invested at the start of the selected period.`;
  document.getElementById('benchmarkNote').textContent = note;

  // Build chart
  const tc = themeColors();
  if (_bmChart) { try { _bmChart.destroy(); } catch(e) {} }

  const ctx = document.getElementById('benchmarkChart').getContext('2d');
  const portColor = tc.accent || '#2D6A4F';
  const datasets = [
    {
      label: 'Portfolio',
      data: port,
      borderColor: portColor,
      backgroundColor: portColor + '22',
      borderWidth: 2.8,
      pointRadius: 0,
      pointHoverRadius: 5,
      fill: false,
      tension: 0.3,
      order: 0
    },
    ...series.map((s, i) => ({
      label: s.longLabel,
      data: s.data,
      borderColor: s.color,
      backgroundColor: s.color + '18',
      borderWidth: 2,
      pointRadius: 0,
      pointHoverRadius: 5,
      fill: false,
      tension: 0.3,
      borderDash: s.dash || [],
      order: i + 1
    }))
  ];

  _bmChart = new Chart(ctx, {
    type: 'line',
    data: { labels: dates, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: {
          display: true,
          position: 'top',
          labels: { color: tc.ink, font: { size: 12 }, usePointStyle: true, boxWidth: 20, padding: 14 }
        },
        tooltip: {
          backgroundColor: tc.paper + 'EE',
          titleColor: tc.ink,
          bodyColor: tc.muted,
          borderColor: tc.line,
          borderWidth: 1,
          callbacks: {
            label: ctx => ` ${ctx.dataset.label}: $${ctx.parsed.y.toFixed(2)}`,
            // Footer lists alpha vs every benchmark so the tooltip stays
            // useful no matter how many benchmarks are on.
            footer: items => {
              const p = items.find(i => i.dataset.label === 'Portfolio');
              if (!p) return '';
              return items
                .filter(i => i.dataset.label !== 'Portfolio')
                .map(i => {
                  const diff = p.parsed.y - i.parsed.y;
                  const sym  = BENCHMARKS.find(b => b.longLabel === i.dataset.label)?.label || i.dataset.label;
                  return `Alpha vs ${sym}: ${diff >= 0 ? '+' : ''}${diff.toFixed(2)}`;
                })
                .join('\n');
            }
          }
        }
      },
      scales: {
        x: {
          ticks: (() => {
            const n = dates.length;
            const numTicks = 8;
            const showAt = new Set();
            for (let i = 0; i < numTicks; i++) {
              showAt.add(Math.round(i * (n - 1) / (numTicks - 1)));
            }
            return {
              color: tc.muted, font: { size: 10 },
              autoSkip: false,
              maxRotation: 0,
              callback: function(val, idx) {
                return showAt.has(idx) ? this.getLabelForValue(val).slice(0, 7) : undefined;
              }
            };
          })(),
          grid: { color: tc.lineSoft }
        },
        y: {
          ticks: {
            color: tc.muted, font: { size: 11 },
            callback: v => '$' + v.toFixed(0)
          },
          grid: { color: tc.lineSoft }
        }
      }
    }
  });
}

function render() {
  if (!state.wb) return;
  if (!state._holdings) state._holdings = parseHoldings();
  if (!state._txs)      state._txs      = parseTransactions();
  if (!state._perf)     state._perf     = computePerformance(state._txs, state._holdings);
  const holdings = state._holdings;
  const txs      = state._txs;
  const perf     = state._perf;

  document.getElementById('content').innerHTML = `
    ${renderMasthead()}
    ${renderHeadline(perf, holdings)}
    ${renderMemberCards(perf)}
    ${renderMemberCompare()}
    ${renderAllocation()}
    ${renderHoldings(holdings)}
    ${renderBenchmark()}
    ${renderLookThrough(holdings)}
    ${renderFooter()}
  `;
  renderCharts(perf, holdings, txs);
  setTimeout(() => { renderBenchmarkChart(); renderLookThroughChart(); }, 10);

  // Count-up animation on headline KPIs
  document.querySelectorAll('.kpi-value[data-animate]').forEach((el, idx) => {
    const kind = el.getAttribute('data-animate');
    const target = parseFloat(el.getAttribute('data-target'));
    if (isNaN(target)) return;
    const formatter = kind === 'pct' ? FMT_PCT : FMT_USD;
    el.innerHTML = formatter(0);
    setTimeout(() => animateNumber(el, target, 900, formatter), 80 + idx * 60);
  });
}
</script>
</body>
</html>
